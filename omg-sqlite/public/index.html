<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>金幣多｜內部收款系統</title>
  <style>
    *{box-sizing:border-box} body{margin:0;min-height:100vh;font-family:"Microsoft JhengHei",Arial,sans-serif;background:linear-gradient(135deg,#111827,#020617);color:#111827;display:flex;justify-content:center;align-items:center;padding:20px}.card{width:100%;max-width:480px;background:#fff;border-radius:24px;padding:34px;box-shadow:0 24px 70px rgba(0,0,0,.45)}.brand{text-align:center;font-size:14px;letter-spacing:3px;color:#92400e;font-weight:900;margin-bottom:10px}h1{margin:0;text-align:center;font-size:30px}.subtitle{text-align:center;color:#6b7280;margin:12px 0 28px;line-height:1.7}label{display:block;font-size:16px;font-weight:900;margin:16px 0 10px}input,select{width:100%;height:58px;border:1px solid #d1d5db;border-radius:16px;font-size:22px;padding:0 18px;outline:none}input:focus,select:focus{border-color:#f59e0b;box-shadow:0 0 0 4px rgba(245,158,11,.18)}button{width:100%;height:58px;margin-top:20px;border:0;border-radius:16px;background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#111827;font-size:20px;font-weight:900;cursor:pointer}.admin-btn{display:block;width:100%;height:58px;line-height:58px;margin-top:12px;border-radius:16px;background:#111827;color:white;text-align:center;text-decoration:none;font-size:20px;font-weight:900}.info{margin-top:24px;padding:18px;background:#f9fafb;border-radius:16px;color:#4b5563;line-height:1.9;font-size:14px}.footer{text-align:center;color:#9ca3af;margin-top:18px;font-size:13px}.quick{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}.quick button{height:44px;margin:0;font-size:15px;background:#f3f4f6;color:#111827;border:1px solid #e5e7eb}.quick button:hover{background:#fef3c7}
  </style>
</head>
<body>
  <main class="card">
    <div class="brand">INTERNAL PAYMENT</div>
    <h1>金幣多收款系統</h1>
    <div class="subtitle">內部建立付款單使用，不開放會員自行下單。</div>
    <form method="POST" action="/create-payment">
      <label for="amount">收款金額</label>
      <input id="amount" name="amount" type="number" min="1" step="1" placeholder="例如：1000" required />
      <div class="quick">
        <button type="button" onclick="amount.value=1000">1000</button>
        <button type="button" onclick="amount.value=3000">3000</button>
        <button type="button" onclick="amount.value=5000">5000</button>
      </div>
      <label for="payment">付款方式</label>
      <select id="payment" name="payment">
        <option value="CVS">超商代碼</option>
        <option value="BARCODE">超商條碼</option>
        <option value="ATM">ATM 虛擬帳號</option>
      </select>
      <button type="submit">建立付款單</button>
      <a href="/admin/orders" class="admin-btn">查看訂單後台</a>
    </form>
    <div class="info">
      用途：建立歐買尬付款單<br />
      保存：SQLite 資料庫永久保存<br />
      後台：搜尋、篩選、統計、查看付款資訊
    </div>
    <div class="footer">金額確認後再建立付款單。</div>
  </main>
</body>
</html>
