<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>金爸爸｜安全付款系統</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  font-family:"Microsoft JhengHei",sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;

  background:
    radial-gradient(circle at top,
    rgba(251,191,36,.15),
    transparent 35%),
    radial-gradient(circle at bottom,
    rgba(245,158,11,.08),
    transparent 30%),
    linear-gradient(
      135deg,
      #0f172a,
      #111827,
      #020617
    );
}

.card{
  width:100%;
  max-width:480px;

  background:rgba(255,255,255,.98);

  border-radius:30px;

  padding:38px;

  box-shadow:
    0 40px 100px rgba(0,0,0,.45),
    0 10px 30px rgba(251,191,36,.12);
}

.brand{
  text-align:center;
  font-size:14px;
  letter-spacing:5px;
  color:#f59e0b;
  font-weight:900;
  margin-bottom:12px;
}

h1{
  text-align:center;
  font-size:38px;
  font-weight:900;
  color:#111827;
}

.subtitle{
  text-align:center;
  margin-top:10px;
  margin-bottom:32px;

  color:#6b7280;
  font-size:15px;
}

label{
  display:block;
  font-size:16px;
  font-weight:800;
  margin-bottom:10px;
  color:#111827;
}

input{
  width:100%;
  height:68px;

  border:2px solid #e5e7eb;
  border-radius:20px;

  text-align:center;

  font-size:28px;
  font-weight:700;

  outline:none;

  transition:.25s;
}

input:focus{
  border-color:#f59e0b;

  box-shadow:
  0 0 0 5px rgba(245,158,11,.15);
}

.payment-grid{
  display:grid;
  gap:14px;
  margin-top:10px;
}

.pay-btn{
  width:100%;
  height:78px;

  border:2px solid #e5e7eb;
  border-radius:20px;

  background:#fff;

  font-size:20px;
  font-weight:900;

  cursor:pointer;

  transition:.25s;
}

.pay-btn:hover{
  transform:translateY(-3px);

  box-shadow:
    0 10px 25px rgba(0,0,0,.08);
}

.pay-btn.active{
  border-color:#f59e0b;

  background:
  linear-gradient(
    135deg,
    #fff7ed,
    #fffbeb
  );

  color:#b45309;

  box-shadow:
    0 10px 25px rgba(245,158,11,.20);
}

.submit-btn{
  width:100%;
  height:68px;

  margin-top:30px;

  border:none;
  border-radius:20px;

  background:
  linear-gradient(
    135deg,
    #fcd34d,
    #f59e0b
  );

  color:#111827;

  font-size:22px;
  font-weight:900;

  cursor:pointer;

  transition:.25s;

  box-shadow:
    0 15px 35px rgba(245,158,11,.30);
}

.submit-btn:hover{
  transform:translateY(-3px);

  box-shadow:
    0 20px 45px rgba(245,158,11,.40);
}

.submit-btn:active{
  transform:translateY(0);
}

@media(max-width:500px){

  .card{
    padding:28px;
  }

  h1{
    font-size:32px;
  }

  .pay-btn{
    font-size:18px;
  }

  input{
    font-size:24px;
  }
}
</style>
</head>

<body>

<main class="card">

  <div class="brand">
    OMG PAYMENT
  </div>

  <h1>金爸爸</h1>

  <div class="subtitle">
    遊戲幣安全付款系統
  </div>

  <form method="POST" action="/create-payment">

    <label for="amount">
      購買金額
    </label>

    <input
      id="amount"
      name="amount"
      type="number"
      min="1"
      step="1"
      placeholder="例如：1000"
      required
    >

    <label style="margin-top:22px;">
      付款方式
    </label>

    <div class="payment-grid">

      <button
        type="button"
        class="pay-btn active"
        onclick="selectPayment('CVS',this)">
        🏪 超商代碼
      </button>

      <button
        type="button"
        class="pay-btn"
        onclick="selectPayment('ATM',this)">
        🏦 ATM 虛擬帳號
      </button>

    </div>

    <input
      type="hidden"
      id="payment"
      name="payment"
      value="CVS">

    <button
      type="submit"
      class="submit-btn">
      建立付款訂單
    </button>

  </form>

</main>

<script>
function selectPayment(type,btn){

  document
    .querySelectorAll('.pay-btn')
    .forEach(item=>{
      item.classList.remove('active');
    });

  btn.classList.add('active');

  document
    .getElementById('payment')
    .value = type;
}
</script>

</body>
</html>
