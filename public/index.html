<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>金爸爸遊戲幣｜歐買尬收款系統</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft JhengHei", Arial, sans-serif;
      background: radial-gradient(circle at top, #374151 0, #111827 45%, #020617 100%);
      color: #111827;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
    }
    .card {
      width: 100%;
      max-width: 460px;
      background: #fff;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 24px 70px rgba(0,0,0,.45);
    }
    .brand {
      text-align: center;
      font-size: 14px;
      letter-spacing: 3px;
      color: #92400e;
      font-weight: 800;
      margin-bottom: 10px;
    }
    h1 {
      margin: 0;
      text-align: center;
      font-size: 28px;
    }
    .subtitle {
      text-align: center;
      color: #6b7280;
      margin: 12px 0 26px;
      line-height: 1.7;
    }
    label {
      display: block;
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 10px;
    }
    input {
      width: 100%;
      height: 58px;
      border: 1px solid #d1d5db;
      border-radius: 16px;
      font-size: 24px;
      padding: 0 18px;
      outline: none;
    }
    input:focus {
      border-color: #f59e0b;
      box-shadow: 0 0 0 4px rgba(245,158,11,.18);
    }
    .payment-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 8px;
    }
    .pay-btn {
      width: 100%;
      height: 62px;
      border: 2px solid #e5e7eb;
      border-radius: 16px;
      background: #fff;
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
      color: #111827;
      margin-top: 0;
    }
    .pay-btn.active {
      border-color: #f59e0b;
      background: #fff7ed;
      color: #92400e;
    }
    .submit-btn {
      width: 100%;
      height: 58px;
      margin-top: 22px;
      border: 0;
      border-radius: 16px;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: #111827;
      font-size: 20px;
      font-weight: 900;
      cursor: pointer;
    }
    .info {
      margin-top: 24px;
      padding: 18px;
      background: #f9fafb;
      border-radius: 16px;
      color: #4b5563;
      line-height: 1.9;
      font-size: 14px;
    }
    .footer {
      text-align: center;
      color: #9ca3af;
      margin-top: 18px;
      font-size: 13px;
      line-height: 1.6;
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="brand">OMG PAYMENT</div>
    <h1>金爸爸遊戲幣收款</h1>

    <div class="subtitle">
      輸入金額並選擇付款方式，建立歐買尬付款訂單。
    </div>

    <form method="POST" action="/create-payment">
      <label for="amount">購買金額</label>
      <input
        id="amount"
        name="amount"
        type="number"
        min="1"
        step="1"
        placeholder="例如：1000"
        required
      />

      <label style="margin-top:18px;">付款方式</label>

      <div class="payment-grid">
        <button
          type="button"
          class="pay-btn active"
          onclick="selectPayment('CVS', this)"
        >
          🏪 超商代碼
        </button>

        <button
          type="button"
          class="pay-btn"
          onclick="selectPayment('ATM', this)"
        >
          🏦 ATM 虛擬帳號
        </button>
      </div>

      <input type="hidden" name="payment" id="payment" value="CVS" />

      <button class="submit-btn" type="submit">
        建立付款訂單
      </button>
    </form>

    <div class="info">
      收款名稱：歐買尬<br />
      商品名稱：金爸爸遊戲幣<br />
      收款方式：ATM 虛擬帳號 / 超商代碼<br />
      有效時間：1 天<br />
      寄送地址：付款人不需填寫
    </div>

    <div class="footer">
      金額確認後再送出，付款代碼建立後請於期限內完成付款。
    </div>
  </main>

  <script>
    function selectPayment(type, btn) {
      document.querySelectorAll(".pay-btn").forEach(function(item) {
        item.classList.remove("active");
      });

      btn.classList.add("active");
      document.getElementById("payment").value = type;
    }
  </script>
</body>
</html>
